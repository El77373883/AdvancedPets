name: AdvancedPets Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Instalar dependencias locales (Spigot)
        run: |
          wget -O BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          java -jar BuildTools.jar --rev 1.21.1 --compile craftbukkit
          mvn install:install-file -Dfile=spigot-1.21.1.jar -DgroupId=org.spigotmc -DartifactId=spigot -Dversion=1.21.1-R0.1-SNAPSHOT -Dpackaging=jar

      - name: 🔨 Compilar con Maven
        run: mvn clean package -DskipTests

      - name: ✅ Verificar que el JAR existe
        run: |
          echo "✅ Archivos generados:"
          ls -la target/

      - name: 📤 Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedPets-1.0.0
          path: target/AdvancedPets-1.0.0.jar
          retention-days: 30

      - name: 🎉 Build exitoso
        run: |
          echo "╔══════════════════════════════╗"
          echo "║  ✅ ADVANCEDPETS COMPILADO!  ║"
          echo "║  📦 JAR listo para usar      ║"
          echo "║  👑 by soyadrianyt001        ║"
          echo "╚══════════════════════════════╝"
