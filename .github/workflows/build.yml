name: AdvancedPets Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 📦 Instalar Spigot desde repo publico
        run: |
          mvn dependency:get \
            -Dartifact=org.spigotmc:spigot-api:1.21.1-R0.1-SNAPSHOT \
            -DremoteRepositories=spigot-repo::::https://hub.spigotmc.org/nexus/content/repositories/snapshots/ \
            --no-transfer-progress

      - name: 🔨 Compilar con Maven
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: ✅ Verificar JAR
        run: ls -la target/

      - name: 📤 Subir JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedPets-1.0.0
          path: target/AdvancedPets-*.jar
          retention-days: 30

      - name: 🎉 Build exitoso
        run: |
          echo "╔══════════════════════════════╗"
          echo "║  ✅ ADVANCEDPETS COMPILADO!  ║"
          echo "║  📦 JAR listo para usar      ║"
          echo "║  👑 by soyadrianyt001        ║"
          echo "╚══════════════════════════════╝"
