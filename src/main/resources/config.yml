prefix: "&6&l[&e&lAdvancedPets&6&l] &r"

database:
  type: YML # YML o MYSQL
  mysql:
    host: localhost
    port: 3306
    database: advancedpets
    username: root
    password: password

economy:
  enabled: true

particles:
  enabled: true
  global: true

sounds:
  enabled: true

holograms:
  enabled: true
  show-health: true
  show-level: true
  show-work: true
  show-mood: true
  show-particles: true
  show-kills: true
  show-xp: true

pets:
  max-per-player: 1
  follow-distance: 3
  teleport-distance: 20
  base-health: 20.0
  immortal-default: true
  hunger:
    enabled: true
    interval-minutes: 10
    refuse-work-when-hungry: true
  sleep:
    enabled: true
    hour: 21

